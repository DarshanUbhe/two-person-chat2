<!DOCTYPE html>
<html>
<head>
  <title>2 Person Chat Room</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      padding-top: 40px;
    }

    .chat {
      width: 360px;
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      overflow: hidden;
    }

    .header {
      background: #2563eb;
      color: white;
      padding: 14px;
      font-size: 18px;
      font-weight: bold;
    }

    #messages {
      height: 400px;
      overflow-y: auto;
      padding: 12px;
      list-style: none;
      margin: 0;
    }

    #messages li {
      padding: 8px 10px;
      margin-bottom: 8px;
      background: #eef2ff;
      border-radius: 6px;
    }

    .system {
      background: #fef3c7 !important;
      color: #92400e;
      font-size: 13px;
      text-align: center;
    }

    form {
      display: flex;
      border-top: 1px solid #ddd;
    }

    input {
      flex: 1;
      padding: 12px;
      border: none;
      outline: none;
    }

    button {
      padding: 12px 16px;
      border: none;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>
  <div class="chat">
    <div class="header">2 Person Chat Room</div>

    <ul id="messages"></ul>

    <form id="form">
      <input id="input" autocomplete="off" placeholder="Type a message..." />
      <button>Send</button>
    </form>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();

    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const messages = document.getElementById("messages");

    form.addEventListener("submit", (e) => {
      e.preventDefault();

      const text = input.value.trim();

      if (text) {
        socket.emit("chatMessage", text);
        input.value = "";
      }
    });

    socket.on("chatMessage", (data) => {
      const li = document.createElement("li");
      li.textContent = data.message;
      messages.appendChild(li);
      messages.scrollTop = messages.scrollHeight;
    });

    socket.on("systemMessage", (message) => {
      const li = document.createElement("li");
      li.textContent = message;
      li.className = "system";
      messages.appendChild(li);
      messages.scrollTop = messages.scrollHeight;
    });

    socket.on("roomFull", () => {
      alert("This chat room already has 2 people.");
    });
  </script>
</body>
</html>
